name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 需先在 repo secrets 設定 CLOUDFLARE_API_TOKEN(見 DEPLOY.md)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply fintrack-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: Set JWT secret (if configured)
        run: |
          if [ -n "$JWT_SECRET" ]; then
            echo "$JWT_SECRET" | npx wrangler secret put JWT_SECRET
          else
            echo "JWT_SECRET repo secret not set; skipping (worker falls back to dev secret)"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
